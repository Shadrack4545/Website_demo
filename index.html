<!doctype html>
<html lang="en">
  <head>
    <!-- Essential Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Connect with African students in Vladivostok across all universities. Join our vibrant community for events, resources, networking, and support." />
    <meta name="keywords" content="African students, Vladivostok, community, networking, events, resources, association" />
    <meta name="author" content="African Student Community" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="AASV - Association Of African Students In Vladivostok" />
    <meta property="og:description" content="Connect with African students in Vladivostok across all universities. Join our vibrant community." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://localhost:5176" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="African Student Community" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AASV - Association Of African Students In Vladivostok" />
    <meta name="twitter:description" content="Connect with African students across all universities in Vladivostok" />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Additional Meta Tags -->
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Canonical Link -->
    <link rel="canonical" href="http://localhost:5176" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    
    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    
    <title>African Student Community Platform | Vladivostok State University</title>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
